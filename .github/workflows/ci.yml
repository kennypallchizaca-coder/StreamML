name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python, models and Compose
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-api.txt
            apps/connector/pyproject.toml

      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run automated tests
        run: python -m pytest -q

      - name: Guard tracked content against common secrets
        run: python scripts/check_no_secrets.py --history

      - name: Compile Python sources
        run: python -m compileall -q apps src scripts

      - name: Verify published model release
        run: python scripts/verify_release.py

      - name: Run model inference demo
        run: python scripts/demo_models.py

      - name: Build connector wheel
        run: python -m pip wheel --no-deps --wheel-dir dist/connector apps/connector

      - name: Validate Docker Compose configuration
        run: docker compose --env-file deployment/.env.example -f infrastructure/docker/docker-compose.yml config --quiet

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build production frontend
        run: npm run build
