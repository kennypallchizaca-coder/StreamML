name: streamml

x-default-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    environment:
      STREAMML_ENVIRONMENT: production
      STREAMML_DATABASE_PATH: /app/runtime/streamml.sqlite3
      STREAMML_TOKEN_SECRET: ${STREAMML_TOKEN_SECRET:?Set STREAMML_TOKEN_SECRET in the deployment env file}
      STREAMML_MEDIA_AUTH_SECRET: ${STREAMML_MEDIA_AUTH_SECRET:?Set STREAMML_MEDIA_AUTH_SECRET in the deployment env file}
      STREAMML_ALLOWED_ORIGINS: ${STREAMML_ALLOWED_ORIGINS:?Set STREAMML_ALLOWED_ORIGINS in the deployment env file}
      STREAMML_MEDIAMTX_PUBLIC_BASE: ${STREAMML_MEDIAMTX_PUBLIC_BASE:?Set STREAMML_MEDIAMTX_PUBLIC_BASE in the deployment env file}
      STREAMML_MEDIAMTX_RTMP_PUBLISH_BASE: ${STREAMML_MEDIAMTX_RTMP_PUBLISH_BASE:-}
      STREAMML_BOOTSTRAP_EMAIL: ${STREAMML_BOOTSTRAP_EMAIL:?Set STREAMML_BOOTSTRAP_EMAIL in the deployment env file}
      STREAMML_BOOTSTRAP_PASSWORD: ${STREAMML_BOOTSTRAP_PASSWORD:?Set STREAMML_BOOTSTRAP_PASSWORD in the deployment env file}
      STREAMML_COOKIE_SECURE: "true"
      STREAMML_ENFORCE_HTTPS: "true"
    volumes:
      - ../../models/registry:/app/models/registry:ro
      - api_data:/app/runtime
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks: [backend]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_WS_BASE_URL: /ws
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m,nosuid,nodev
      - /var/run:size=4m,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks: [edge]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 5s

  mediamtx:
    image: ${MEDIAMTX_IMAGE:-bluenviron/mediamtx:1.19.2}
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    environment:
      MTX_WEBRTCADDITIONALHOSTS: ${MEDIAMTX_WEBRTC_ADDITIONAL_HOSTS:?Set the public MediaMTX host}
      MTX_AUTHHTTPADDRESS: http://mediamtx:${STREAMML_MEDIA_AUTH_SECRET:?Set STREAMML_MEDIA_AUTH_SECRET in the deployment env file}@${STREAMML_API_HOST:-api}:8000/api/v1/internal/mediamtx/auth
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - fallback_media:/fallback:ro
    ports:
      # Keep RTMP local by default. Change the bind deliberately only when a
      # remote OBS publisher and firewall/auth controls have been validated.
      - "${MEDIAMTX_RTMP_PORT_BIND:-127.0.0.1:1935}:1935"
      # Loopback listeners support the documented local frontend/API workflow.
      # Public production playback continues through nginx at /media.
      - "${MEDIAMTX_HLS_PORT_BIND:-127.0.0.1:8888}:8888"
      - "${MEDIAMTX_WEBRTC_TCP_PORT_BIND:-127.0.0.1:8889}:8889"
      - "${MEDIAMTX_WEBRTC_UDP_PORT_BIND:-0.0.0.0:8189}:8189/udp"
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    # edge is required for Docker to materialize the explicitly declared host
    # port bindings; backend remains the isolated path to the API.
    networks: [edge, backend]
    depends_on:
      api:
        condition: service_healthy
      media-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/mediamtx", "--version"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  media-init:
    build:
      context: ../..
      dockerfile: infrastructure/docker/media.Dockerfile
    command: ["/app/apps/media/generate_fallback.sh"]
    user: "0:0"
    volumes:
      - fallback_media:/fallback
    read_only: true
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    restart: "no"

  media-worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/media.Dockerfile
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    environment:
      STREAMML_MEDIA_AUTH_SECRET: ${STREAMML_MEDIA_AUTH_SECRET:?Set STREAMML_MEDIA_AUTH_SECRET in the deployment env file}
      STREAMML_INTERNAL_RTMP_BASE: rtmp://mediamtx:1935
      STREAMML_RESTREAM_CONFIG_JSON: ${STREAMML_RESTREAM_CONFIG_JSON:-{}}
    read_only: true
    volumes:
      - fallback_media:/fallback:ro
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks: [backend]
    depends_on:
      mediamtx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; assert Path('/fallback/fallback.mp4').stat().st_size > 0"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.30.3-alpine
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    ports:
      - "${STREAMML_HTTP_PORT_BIND:-80}:80"
      - "${STREAMML_HTTPS_PORT_BIND:-443}:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_FILE:?Set TLS_CERT_FILE}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_KEY_FILE:?Set TLS_KEY_FILE}:/etc/nginx/certs/privkey.pem:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m,nosuid,nodev
      - /var/run:size=4m,nosuid,nodev
      - /var/log/nginx:size=16m,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks: [edge, backend]
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      mediamtx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--no-check-certificate", "--spider", "https://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  edge:
  backend:
    internal: true

volumes:
  api_data:
  fallback_media:
