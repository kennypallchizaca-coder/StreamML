user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log crit;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format streamml '$remote_addr [$time_local] "$request_method $uri $server_protocol" '
                        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                        'request_id=$request_id';
    access_log /var/log/nginx/access.log streamml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=telemetry_limit:10m rate=10r/s;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 1m;

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(self \"https://vdo.ninja\"), microphone=(self \"https://vdo.ninja\"), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:; frame-src 'self' https://vdo.ninja; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

        location = /health {
            access_log off;
            proxy_pass http://api:8000/health/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }

        location = /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Request-ID $request_id;
        }

        location = /api/v1/telemetry {
            limit_req zone=telemetry_limit burst=20 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Request-ID $request_id;
        }

        location ^~ /api/v1/internal/ {
            access_log off;
            return 404;
        }

        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Request-ID $request_id;
        }

        location /ws/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
            proxy_buffering off;
        }

        location ~ ^/media/(.+)/(whep|whip)(/.*)?$ {
            rewrite ^/media/(.*)$ /$1 break;
            proxy_pass http://mediamtx:8889;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_read_timeout 75s;
            proxy_redirect ~^/(.*)$ /media/$1;
        }

        location /media/ {
            rewrite ^/media/(.*)$ /$1 break;
            proxy_pass http://mediamtx:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
            proxy_cache off;
            add_header Cache-Control "no-store" always;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto http;
        }
    }
}
