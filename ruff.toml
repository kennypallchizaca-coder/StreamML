line-length = 120
target-version = "py311"

# Configuración de Ruff (Linter y Formateador)
# F (Pyflakes): Errores lógicos
# E (pycodestyle): Convenciones de estilo
# UP (pyupgrade): Sintaxis moderna
# B (flake8-bugbear): Posibles bugs
# SIM (flake8-simplify): Simplificaciones de código
# I (isort): Ordenamiento de imports
[lint]
select = ["E4", "E7", "E9", "F"]

[lint.per-file-ignores]
"scripts/*.py" = ["E402"]
